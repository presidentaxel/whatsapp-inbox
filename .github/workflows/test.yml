name: Tests and Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # Tests backend
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          find app -name "*.py" -exec python -m py_compile {} \;
          echo "✅ Syntaxe Python valide"

      # Lint avec ruff (configuration : backend/pyproject.toml).
      # Bloquant sur les bugs réels (pyflakes, undefined names, bugbear).
      - name: Lint with ruff
        run: ruff check app

      - name: Run backend unit tests (pytest)
        env:
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_KEY: mock_key_123456789012345678901234567890
          WHATSAPP_TOKEN: mock_token
          WHATSAPP_VERIFY_TOKEN: mock_verify_token
          WHATSAPP_PHONE_ID: mock_phone_id
          WHATSAPP_PHONE_NUMBER: +1234567890
          GEMINI_API_KEY: mock_gemini_key
          APP_ENV: test
        run: pytest tests/ -q --tb=short

      # Vérification de format non bloquante tant que le legacy n'est pas
      # passé sous `ruff format`. À durcir une fois le repo nettoyé.
      - name: Format check (non blocking)
        run: ruff format --check app || true

      - name: Check imports (with mock env)
        env:
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_KEY: mock_key_123456789012345678901234567890
          WHATSAPP_TOKEN: mock_token
          WHATSAPP_VERIFY_TOKEN: mock_verify_token
          WHATSAPP_PHONE_ID: mock_phone_id
          WHATSAPP_PHONE_NUMBER: +1234567890
          GEMINI_API_KEY: mock_gemini_key
        run: |
          python << 'EOF'
          import os
          import sys
          
          # S'assurer que les variables sont définies
          required_vars = {
              'SUPABASE_URL': 'https://mock.supabase.co',
              'SUPABASE_KEY': 'mock_key_123456789012345678901234567890',
              'WHATSAPP_TOKEN': 'mock_token',
              'WHATSAPP_VERIFY_TOKEN': 'mock_verify_token',
          }
          
          for var, default in required_vars.items():
              if var not in os.environ:
                  os.environ[var] = default
          
          try:
              # Essayer d'importer le main (avec les mocks)
              import app.main
              print("✅ Imports valides avec variables mock")
          except Exception as e:
              # Si ça échoue à cause de Supabase, c'est OK - on vérifie juste la syntaxe
              if "supabase" in str(e).lower() or "SUPABASE_URL" in str(e):
                  print("⚠️  Erreur Supabase (normal sans vraie config), vérification syntaxe uniquement")
                  # Vérifier juste la syntaxe
                  import py_compile
                  py_compile.compile('app/main.py', doraise=True)
                  print("✅ Syntaxe Python valide")
              else:
                  print(f"❌ Erreur d'import: {e}")
                  sys.exit(1)
          EOF

      - name: Validate module structure
        run: |
          python << 'EOF'
          import sys
          import importlib.util
          
          # Vérifier que les modules peuvent être trouvés (sans les importer)
          routes = [
              'app.api.routes_webhook',
              'app.api.routes_accounts',
              'app.api.routes_auth',
              'app.api.routes_health'
          ]
          
          for route in routes:
              try:
                  spec = importlib.util.find_spec(route)
                  if spec is None:
                      print(f"❌ Route non trouvée: {route}")
                      sys.exit(1)
                  print(f"✅ Route trouvée: {route}")
              except Exception as e:
                  print(f"⚠️  Erreur pour {route}: {e}")
          
          print("✅ Structure des modules valide")
          EOF

      - name: Validate config structure
        env:
          SUPABASE_URL: https://mock.supabase.co
          SUPABASE_KEY: mock_key_123456789012345678901234567890
        run: |
          python << 'EOF'
          import os
          
          try:
              # Vérifier que le module de config peut être importé
              from app.core import config
              print("✅ Module de configuration trouvé")
              
              # Vérifier que les attributs existent
              if hasattr(config, 'settings'):
                  print("✅ Settings trouvé dans config")
          except Exception as e:
              print(f"⚠️  Erreur de configuration: {e}")
          
          print("✅ Structure de configuration valide")
          EOF

  # Tests frontend
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build:ci

      - name: Unit tests (Vitest)
        run: npm run test:ci

      - name: Validate package.json
        run: |
          node -e "const pkg = require('./package.json'); console.log('✅ package.json valide:', pkg.name)"

  # Validation des fichiers de configuration
  validate-config:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Caddyfile
        run: |
          if [ -f deploy/Caddyfile ]; then
            # Vérifier que BACKEND_URL est utilisé
            if ! grep -q "BACKEND_URL" deploy/Caddyfile; then
              echo "⚠️  BACKEND_URL non trouvé dans Caddyfile"
            else
              echo "✅ Caddyfile contient BACKEND_URL"
            fi
            
            # Vérifier que les routes critiques existent
            if ! grep -q "@api path /api" deploy/Caddyfile; then
              echo "❌ Route /api non trouvée dans Caddyfile"
              exit 1
            fi
            
            if ! grep -q "@webhook path /webhook" deploy/Caddyfile; then
              echo "❌ Route /webhook non trouvée dans Caddyfile"
              exit 1
            fi
            
            echo "✅ Caddyfile valide"
          else
            echo "❌ Caddyfile non trouvé"
            exit 1
          fi

      - name: Validate docker-compose.prod.yml
        run: |
          if [ -f deploy/docker-compose.prod.yml ]; then
            # Vérifier que BACKEND_URL est dans les variables d'environnement
            if ! grep -q "BACKEND_URL" deploy/docker-compose.prod.yml; then
              echo "❌ BACKEND_URL manquant dans docker-compose.prod.yml"
              exit 1
            fi
            
            # Vérifier que les services critiques existent
            for service in backend frontend caddy; do
              if ! grep -q "^  $service:" deploy/docker-compose.prod.yml; then
                echo "❌ Service $service manquant dans docker-compose.prod.yml"
                exit 1
              fi
            done
            
            echo "✅ docker-compose.prod.yml valide"
          else
            echo "❌ docker-compose.prod.yml non trouvé"
            exit 1
          fi

      - name: List GitHub workflows
        run: |
          WORKFLOWS=$(find .github/workflows -name "*.yml" -o -name "*.yaml" | wc -l)
          echo "📊 Nombre de workflows: $WORKFLOWS"
          
          # Lister tous les workflows
          echo "Workflows trouvés:"
          find .github/workflows -name "*.yml" -o -name "*.yaml" || true

  # Tests de déploiement (sans déployer réellement)
  test-deployment:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, validate-config]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment script
        run: |
          if [ -f deploy/deploy.sh ]; then
            # Vérifier que le script est exécutable
            if [ ! -x deploy/deploy.sh ]; then
              echo "⚠️  deploy.sh n'est pas exécutable"
            fi
            
            # Vérifier que BACKEND_URL est géré
            if ! grep -q "BACKEND_URL" deploy/deploy.sh; then
              echo "⚠️  BACKEND_URL non géré dans deploy.sh"
            else
              echo "✅ deploy.sh gère BACKEND_URL"
            fi
          fi

      - name: Check Dockerfiles
        run: |
          for dockerfile in backend/Dockerfile frontend/Dockerfile; do
            if [ -f "$dockerfile" ]; then
              echo "✅ $dockerfile existe"
            else
              echo "❌ $dockerfile manquant"
              exit 1
            fi
          done

      - name: Validate environment files structure
        run: |
          # Vérifier que les .env.example ou documentation existent
          if [ -f backend/.env.example ] || [ -f README.md ]; then
            echo "✅ Documentation des variables d'environnement trouvée"
          else
            echo "⚠️  Aucune documentation des variables d'environnement"
          fi

  # Résumé final
  test-summary:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, validate-config, test-deployment]
    if: always()
    
    steps:
      - name: Test Summary
        run: |
          echo "=========================================="
          echo "📊 RÉSUMÉ DES TESTS"
          echo "=========================================="
          echo ""
          echo "✅ Tests backend: ${{ needs.test-backend.result }}"
          echo "✅ Tests frontend: ${{ needs.test-frontend.result }}"
          echo "✅ Validation config: ${{ needs.validate-config.result }}"
          echo "✅ Tests déploiement: ${{ needs.test-deployment.result }}"
          echo ""
          
          if [ "${{ needs.test-backend.result }}" != "success" ] || \
             [ "${{ needs.test-frontend.result }}" != "success" ] || \
             [ "${{ needs.validate-config.result }}" != "success" ] || \
             [ "${{ needs.test-deployment.result }}" != "success" ]; then
            echo "❌ Certains tests ont échoué"
            exit 1
          else
            echo "✅ Tous les tests sont passés"
          fi

