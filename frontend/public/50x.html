<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b141a" />
    <title>Service indisponible - WHATSAPP LMDCVTC</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          sans-serif;
        background: #0b141a;
        color: #e9edef;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        padding: 28px 24px;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(17, 27, 33, 0.95), rgba(11, 20, 26, 0.97));
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .code {
        margin: 0 0 12px;
        font-size: 56px;
        font-weight: 800;
        line-height: 1;
        color: rgba(0, 168, 132, 0.95);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.35rem;
        font-weight: 700;
      }
      p {
        margin: 0 0 24px;
        font-size: 0.95rem;
        line-height: 1.5;
        color: rgba(233, 237, 239, 0.72);
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        background: #00a884;
        color: #0b141a;
      }
      a:hover {
        background: #06cf99;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="code" aria-hidden="true">!</p>
      <h1>Service temporairement indisponible</h1>
      <p>
        Le serveur ou l’API ne répond pas correctement (erreur 500, 502, 503 ou 504). Réessaie dans
        quelques instants.
      </p>
      <a href="/">Réessayer</a>
    </div>
  </body>
</html>
